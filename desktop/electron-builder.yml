appId: com.smilex.cas
productName: SmileX-CAS
directories:
  buildResources: build
files:
  - dist/**/*
  - dist-electron/**/*
  - "!node_modules/**/*"
win:
  target:
    - nsis
  icon: build/icon.ico
mac:
  target:
    - dmg
  icon: build/icon.icns
linux:
  target:
    - AppImage
  icon: build/icon.png
nsis:
  oneClick: false
  allowToChangeInstallationDirectory: true
  createDesktopShortcut: true