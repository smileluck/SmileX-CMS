services:
  server:
    build: ./server
    ports:
      - "8000:8000"
    volumes:
      - ./server/articles:/app/articles
      - ./server/videos:/app/videos
      - ./server/uploads:/app/uploads
    environment:
      - SECRET_KEY=${SECRET_KEY:-changeme-set-a-real-secret}
      - DATABASE_URL=sqlite:///./cas.db
      - CORS_ORIGINS=http://localhost:5173
      - DEBUG=false
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    restart: unless-stopped
